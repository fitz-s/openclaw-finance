name: Validate Finance Subsystem

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSON snapshots
        run: |
          python -m json.tool docs/openclaw-runtime/finance-cron-jobs.json >/dev/null
          python -m json.tool docs/openclaw-runtime/finance-model-roles.json >/dev/null
          python -m json.tool docs/openclaw-runtime/finance-job-prompt-contract.json >/dev/null
          python -m json.tool docs/openclaw-runtime/snapshot-manifest.json >/dev/null
          python -m json.tool docs/openclaw-runtime/operating-model-audit.json >/dev/null
          python -m json.tool docs/openclaw-runtime/parent-dependency-inventory.json >/dev/null
          python -m json.tool docs/openclaw-runtime/parent-dependency-drift.json >/dev/null
          python -m json.tool docs/openclaw-runtime/wake-threshold-attribution.json >/dev/null
          python -m json.tool docs/openclaw-runtime/report-usefulness-score.json >/dev/null
          python -m json.tool docs/openclaw-runtime/thesis-spine-telemetry-summary.json >/dev/null
          python -m json.tool docs/openclaw-runtime/ibkr-watchlist-freshness-drill.json >/dev/null
          python -m json.tool docs/openclaw-runtime/benchmark-boundary-audit.json >/dev/null
          python -m json.tool docs/openclaw-runtime/runtime-gap-review.json >/dev/null
      - name: Compile Python sources
        run: |
          python -m compileall -q scripts tools
      - name: Audit operating model contracts
        run: |
          python tools/audit_operating_model.py
          python tools/audit_benchmark_boundary.py
          python tools/audit_parent_dependency_drift.py
